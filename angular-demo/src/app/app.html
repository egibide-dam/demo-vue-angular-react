<div class="container py-4">
  <!-- El título y el subtítulo permanecen en AppComponent, no son componentes -->
  <h1 class="text-center mb-1">Tres en Raya</h1>
  <p class="text-center text-muted mb-4">
    <a href="https://angular.dev" target="_blank" rel="noopener noreferrer">Angular 21</a>
  </p>

  <!-- [board], [statusMessage], [statusClass]: property binding, pasa datos al hijo.
       (cellClick): event binding, escucha el evento emitido por GameBoard. -->
  <app-game-board
    [board]="board()"
    [statusMessage]="statusMessage()"
    [statusClass]="statusClass()"
    (cellClick)="handleClick($event)"
  />

  <!-- GameControls no recibe datos; solo escuchamos sus eventos de salida. -->
  <app-game-controls
    (newGame)="newGame()"
    (resetScore)="resetScore()"
  />

  <!-- [score]: pasamos la señal evaluada al componente hijo como input.
       Angular detecta los cambios en la señal y re-renderiza GameScoreboard. -->
  <app-game-scoreboard [score]="score()" />
</div>
